name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Node 21+ provides Object.groupBy (required by eslint-flat-config-utils / Nuxt ESLint).
          # Backend Lambdas still target Node 20 in serverless; CI only runs tooling here.
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint workspace
        run: pnpm run lint

      - name: Run backend tests
        run: pnpm run test

      - name: Typecheck workspace
        run: pnpm run typecheck
